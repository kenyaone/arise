<!-- SLIDE 2: What is Miraa? -->
<div class="slide" id="slide-2">
  <div class="slide-head">🌿 <span data-en="What Is Miraa / Khat?" data-sw="Miraa / Khat ni Nini?" data-sh="Miraa ni Nini Hasa?"></span></div>
  <div class="teach-block">
    <h3 data-en="Origins and Overview" data-sw="Asili na Muhtasari" data-sh="Background ya Miraa"></h3>
    <p data-en="Miraa, known internationally as khat, is a plant (Catha edulis) native to East Africa and the Arabian Peninsula. Its fresh leaves and stems are chewed for a stimulant effect. In Kenya, it is widely consumed, especially in Meru County where it is a major cash crop." data-sw="Miraa, inayojulikana kimataifa kama khat, ni mmea (Catha edulis) asilia wa Afrika Mashariki na Rasi ya Arabia. Majani yake mapya na mashina hutafunwa kwa athari ya kuchochea. Kenya, inatumiwa sana, hasa Kaunti ya Meru ambapo ni zao kuu la biashara." data-sh="Miraa, called khat internationally, ni plant (Catha edulis) kutoka East Africa. Majani yake na stems zinachewedwa kwa stimulant effect. Kenya inakuwa consumed sana, especially Meru County ambapo ni major cash crop."></p>
  </div>
  <div class="fact-grid">
    <div class="fact-card">
      <div class="fact-icon">🌍</div>
      <strong data-en="Also called" data-sw="Pia huitwa" data-sh="Majina mengine"></strong>
      <span data-en="Khat, Qat, Miraa, Muhimu, Murungu" data-sw="Khat, Qat, Miraa, Muhimu, Murungu" data-sh="Khat, Qat, Miraa, Muhimu, Murungu"></span>
    </div>
    <div class="fact-card">
      <div class="fact-icon">🏔️</div>
      <strong data-en="Grown mainly in" data-sw="Hulimwa zaidi" data-sh="Inakuzwa"></strong>
      <span data-en="Meru, Embu, Nyeri (Mt. Kenya region)" data-sw="Meru, Embu, Nyeri (eneo la Mlima Kenya)" data-sh="Meru, Embu, Nyeri — Mt. Kenya region"></span>
    </div>
    <div class="fact-card">
      <div class="fact-icon">💰</div>
      <strong data-en="Legal status in Kenya" data-sw="Hali ya kisheria Kenya" data-sh="Legal status Kenya"></strong>
      <span data-en="Legal to grow and sell; banned in some countries" data-sw="Halali kulima na kuuza; imepigwa marufuku nchi nyingine" data-sh="Legal Kenya; banned places kama UK, USA"></span>
    </div>
    <div class="fact-card">
      <div class="fact-icon">👥</div>
      <strong data-en="Common users" data-sw="Watumiaji wa kawaida" data-sh="Wanaochew kawaida"></strong>
      <span data-en="Men, youth, truck drivers, traders" data-sw="Wanaume, vijana, madereva, wafanyabiashara" data-sh="Wanaume, youth, truck drivers, wafanyabiashara"></span>
    </div>
  </div>
  <div class="key-term">
    <strong>Stimulant</strong>
    <span data-en="A substance that speeds up the central nervous system, increasing alertness, energy, and heart rate." data-sw="Dutu inayoharakisha mfumo wa neva kuu, kuongeza uangalifu, nguvu, na mapigo ya moyo." data-sh="Kitu kinachomake brain na mwili kuwork faster — increases energy na alertness."></span>
  </div>
</div>

<!-- SLIDE 3: Active Chemicals -->
<div class="slide" id="slide-3">
  <div class="slide-head">🧪 <span data-en="Chemicals Inside Miraa" data-sw="Kemikali Zilizo Ndani ya Miraa" data-sh="Chemicals za Miraa"></span></div>
  <div class="teach-block">
    <h3 data-en="What Makes Miraa Dangerous?" data-sw="Nini Hufanya Miraa Kuwa Hatari?" data-sh="Nini Inafanya Miraa Iwe Hatari?"></h3>
    <p data-en="Miraa contains two main psychoactive (mind-altering) chemicals: cathinone and cathine. Cathinone is the more potent and degrades rapidly after harvest — this is why users prefer fresh miraa chewed within 48 hours." data-sw="Miraa ina kemikali mbili kuu zinazobadilisha akili: cathinone na cathine. Cathinone ina nguvu zaidi na huharibika haraka baada ya kuvunwa — hii ndiyo sababu watumiaji wanapenda miraa safi inayotafunwa ndani ya masaa 48." data-sh="Miraa ina chemicals mbili za main: cathinone na cathine. Cathinone ndio stronger na inaexpire haraka — that's why people prefer fresh miraa chewed within 48 hours."></p>
  </div>
  <table class="info-table">
    <tr><th data-en="Chemical" data-sw="Kemikali" data-sh="Chemical"></th><th data-en="Effect" data-sw="Athari" data-sh="Effect"></th><th data-en="Comparison" data-sw="Ulinganisho" data-sh="Comparison"></th></tr>
    <tr>
      <td><strong>Cathinone</strong></td>
      <td data-en="Releases dopamine; euphoria, energy" data-sw="Hutoa dopamine; furaha, nguvu" data-sh="Inatoa dopamine; euphoria na energy"></td>
      <td data-en="Similar to amphetamine" data-sw="Kama amphetamine" data-sh="Kama amphetamine"></td>
    </tr>
    <tr>
      <td><strong>Cathine</strong></td>
      <td data-en="Milder stimulant effect" data-sw="Athari ndogo ya kuchochea" data-sh="Mild stimulant"></td>
      <td data-en="Similar to ephedrine" data-sw="Kama ephedrine" data-sh="Kama ephedrine"></td>
    </tr>
    <tr>
      <td><strong>Tannins</strong></td>
      <td data-en="Constipation, dry mouth" data-sw="Kuvimbiwa, kinywa kavu" data-sh="Constipation, dry mouth"></td>
      <td data-en="Found in tea/coffee" data-sw="Hupatikana katika chai/kahawa" data-sh="Iko pia in tea/coffee"></td>
    </tr>
  </table>
  <div class="warn-box">
    <strong>⚠️ <span data-en="WHO Classification" data-sw="Uainishaji wa WHO" data-sh="WHO Inasema"></span></strong>
    <span data-en="The World Health Organization (WHO) classifies khat as a drug of abuse that can produce mild-to-moderate psychological dependence." data-sw="Shirika la Afya Duniani (WHO) linaainisha khat kama dawa ya kulevya inayoweza kusababisha utegemezi wa kisaikolojia wa wastani." data-sh="WHO inasema khat ni drug ya abuse inayoweza cause moderate psychological dependence."></span>
  </div>

<!-- SLIDE 4: Short-term Effects -->
<div class="slide" id="slide-4">
  <div class="slide-head">⚡ <span data-en="Short-Term Effects of Miraa" data-sw="Athari za Muda Mfupi za Miraa" data-sh="Effects za Miraa — Short Term"></span></div>
  <div class="teach-block">
    <h3 data-en="What Happens When You Chew Miraa?" data-sw="Nini Hutokea Unapotafuna Miraa?" data-sh="Nini Inakutokea Ukichew Miraa?"></h3>
    <p data-en="Effects begin within 15–30 minutes of chewing and may last 3–6 hours. Users experience a mix of desirable and harmful effects simultaneously." data-sw="Athari huanza ndani ya dakika 15-30 za kutafuna na zinaweza kudumu masaa 3-6. Watumiaji hupata mchanganyiko wa athari za kuhitajika na za kudhuru wakati mmoja." data-sh="Effects zinaanza ndani ya minutes 15-30 za kuchew na zinaweza kudumu masaa 3-6. Unapata mix ya good na bad effects."></p>
  </div>
  <table class="info-table">
    <tr><th data-en="Desired Effects (why people use)" data-sw="Athari Zinazotakiwa (sababu ya kutumia)" data-sh="Effects Nzuri (why watu wanachew)"></th><th data-en="Harmful Effects" data-sw="Athari za Kudhuru" data-sh="Bad Effects"></th></tr>
    <tr>
      <td data-en="Increased energy and alertness" data-sw="Nguvu na uangalifu ulioongezeka" data-sh="More energy na alertness"></td>
      <td data-en="Rapid heartbeat (tachycardia)" data-sw="Mapigo ya moyo yanayoharakisha" data-sh="Heart inabeatfast sana"></td>
    </tr>
    <tr>
      <td data-en="Euphoria (feeling of happiness)" data-sw="Euphoria (hisia ya furaha)" data-sh="Feeling ya happiness — euphoria"></td>
      <td data-en="High blood pressure" data-sw="Shinikizo la damu la juu" data-sh="High blood pressure"></td>
    </tr>

      <p data-en="2. A friend says: 'Miraa is just a plant — it's natural and therefore safe.' How would you respond? (3 marks)" data-sw="2. Rafiki anasema: 'Miraa ni mmea tu — ni wa asili na kwa hiyo ni salama.' Ungejibu vipi? (alama 3)" data-sh="2. Rafiki anasema: 'Miraa ni plant tu — ni natural kwa hiyo ni safe.' Ungejibu vipi? (marks 3)"></p>
      <textarea class="sa-box" id="sa2" data-en="Write your answer here..." data-sw="Andika jibu lako hapa..." data-sh="Andika answer yako hapa..."></textarea>
      <button class="grade-btn" onclick="gradeAnswer('sa2','sf2','cfg2')">✓ <span data-en="Grade" data-sw="Pima" data-sh="Grade"></span></button>
      <div class="sa-feedback" id="sf2"></div>
    </div>

    <div class="sa-item">
      <p data-en="3. Describe FOUR warning signs that someone may be dependent on miraa. (4 marks)" data-sw="3. Eleza ISHARA NNE za onyo kwamba mtu anaweza kutegemea miraa. (alama 4)" data-sh="3. Describe FOUR warning signs kwamba mtu anaweza kuwa dependent kwa miraa. (marks 4)"></p>
      <textarea class="sa-box" id="sa3" data-en="Write your answer here..." data-sw="Andika jibu lako hapa..." data-sh="Andika answer yako hapa..."></textarea>
      <button class="grade-btn" onclick="gradeAnswer('sa3','sf3','cfg3')">✓ <span data-en="Grade" data-sw="Pima" data-sh="Grade"></span></button>
      <div class="sa-feedback" id="sf3"></div>
    </div>

    <div class="submit-bar">
      <button class="submit-btn" onclick="submitQuiz()"><span data-en="Submit Quiz" data-sw="Wasilisha Jaribio" data-sh="Submit Quiz">Submit Quiz</span></button>
    </div>
    <div class="score-box" id="score-box">
      <h3 id="score-title"></h3>
      <p id="score-detail"></p>
    </div>
  </div>
</div>

</div><!-- /slides-wrap -->

<!-- NAV BAR -->
<div class="nav-bar">
  <button class="nav-btn" id="prev-btn" onclick="changeSlide(-1)" disabled>&#8592; <span data-en="Prev" data-sw="Nyuma" data-sh="Back"></span></button>
  <div class="dot-nav" id="dot-nav"></div>
  <button class="nav-btn" id="next-btn" onclick="changeSlide(1)"><span data-en="Next" data-sw="Mbele" data-sh="Next"></span> &#8594;</button>
</div>

<script>
// ── STATE ──
let currentSlide = 1;
const TOTAL = 10;
let lang = 'en';
let visited = new Set([1]);
let quizSubmitted = false;
let partAScore = 0;

// Fill-blank answers
const FILL_ANSWERS = {
  f1: ['cathinone','kathion'],
  f2: ['psychological','psycho','kisaikolojia','mental'],
  f3: ['15','dakika 15'],
  f4: ['oral','mouth','mdomo'],
  f5: ['1192']
};

// ── LANGUAGE ──
function setLang(l) {
  lang = l;
  applyLang(l);
  document.querySelectorAll('.lb-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ── FONT SIZE ──
function setSize(s) {
  document.body.style.fontSize = s === 'large' ? '17px' : '15px';
  document.querySelectorAll('.lb-size-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

// ── SLIDE NAV ──
function showSlide(n) {
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  document.getElementById('slide-' + n).classList.add('active');
  document.getElementById('slide-badge').textContent = n + ' / ' + TOTAL;
  document.getElementById('prev-btn').disabled = n === 1;
  document.getElementById('next-btn').disabled = n === TOTAL;
  visited.add(n);
  updateDots();
  window.scrollTo(0, 0);
}

function changeSlide(d) {
  const next = currentSlide + d;
  if (next < 1 || next > TOTAL) return;
  currentSlide = next;
  showSlide(currentSlide);
}

function updateDots() {
  const nav = document.getElementById('dot-nav');
  nav.innerHTML = '';
  for (let i = 1; i <= TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentSlide ? ' active' : visited.has(i) && i !== currentSlide ? ' done' : '');
    d.onclick = (function(n){ return function(){ currentSlide = n; showSlide(n); }; })(i);
    nav.appendChild(d);
  }
}

// ── FILL BLANK GRADING ──
function checkFill(id, resultId) {
  const val = document.getElementById(id).value.trim().toLowerCase();
  const accepted = FILL_ANSWERS[id];
  const ok = accepted.some(a => val.includes(a));
  const el = document.getElementById(resultId);
  el.textContent = ok ? '✓ Correct! (1 mark)' : '✗ Expected: ' + accepted[0];
  el.className = 'fb-result ' + (ok ? 'ok' : 'no');
  return ok ? 1 : 0;
}

// ── SHORT ANSWER GRADING ──
const GRADE_CFGS = {
  cfg1: {
    keywords: ['heart','blood pressure','mental','psychosis','depression','oral','tooth','teeth','cancer','liver','malnutrition','weight','addiction','stroke','moyo','shinikizo','akili','meno','saratani','ini','uzito','uraibu'],
    required: 3, marks: 3,
    model: 'Three consequences: (1) Heart — chronic high blood pressure and stroke risk; (2) Mental health — depression, psychosis, paranoia; (3) Oral health — tooth decay, gum disease, oral cancer risk.'
  },
  cfg2: {
    keywords: ['natural','chemical','cathinone','dopamine','dangerous','harmful','WHO','addictive','dependence','asili','kemikali','hatari','kudhuru','uraibu','utegemezi'],
    required: 3, marks: 3,
    model: 'Response: Being natural does not mean safe. Cathinone is a powerful chemical similar to amphetamine. Many natural substances are harmful. WHO classifies it as a drug causing psychological dependence. Long-term chewing causes serious health damage.'
  },
  cfg3: {
    keywords: ['daily','every day','money','income','spend','family','irritable','depressed','concentrate','tolerance','more','lie','lying','work','hobbies','kila siku','pesa','familia','hasira','unyogovu','zaidi','kusimama','burudani'],
    required: 4, marks: 4,
    model: 'Four warning signs: (1) Chewing every day — cannot skip without feeling unwell; (2) Spending most income on miraa while family lacks basics; (3) Feeling irritable or depressed without miraa; (4) Needing more to get same effect (tolerance); (5) Giving up work or hobbies to chew more; (6) Lying to family about use.'
  }
};

function gradeAnswer(saId, fbId, cfgKey) {
  const cfg = GRADE_CFGS[cfgKey];
  const ans = document.getElementById(saId).value.trim().toLowerCase();
  if (!ans) { alert('Please write an answer first.'); return; }
  const found = cfg.keywords.filter(k => ans.includes(k.toLowerCase()));
  const missed = cfg.keywords.filter(k => !ans.includes(k.toLowerCase())).slice(0, 5);
  const hitRate = Math.min(found.length / cfg.required, 1);
  const marks = Math.round(hitRate * cfg.marks);
  const cls = marks >= cfg.marks ? 'ok' : marks > 0 ? 'partial' : 'no';
  const fb = document.getElementById(fbId);
  fb.className = 'sa-feedback show ' + cls;
  fb.innerHTML =
    '<strong>' + marks + ' / ' + cfg.marks + ' marks</strong><br>' +
    (found.length ? '<span class="kw-found">\u2713 Key points: ' + found.slice(0,6).join(', ') + '</span><br>' : '') +
    (missed.length ? '<span class="kw-miss">\u2717 Missing: ' + missed.join(', ') + '</span><br>' : '') +
    '<div class="model-ans"><strong>Model answer:</strong> ' + cfg.model + '</div>';
}

// ── SUBMIT QUIZ ──
function submitQuiz() {
  if (quizSubmitted) return;
  partAScore = 0;
  ['f1','f2','f3','f4','f5'].forEach(id => {
    partAScore += checkFill(id, id.replace('f','fr'));
  });
  quizSubmitted = true;
  const box = document.getElementById('score-box');
  box.style.display = 'block';
  document.getElementById('score-title').textContent = 'Part A Score: ' + partAScore + ' / 5';
  document.getElementById('score-detail').textContent = 'Grade short answer questions above for full marks. Well done for completing the lesson!';
  box.scrollIntoView({behavior:'smooth'});

  // Report to ARISE LMS
  if (window.ARISE_LESSON_ID) {
    fetch('/arise/api/submit-score', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        lesson_id: window.ARISE_LESSON_ID,
        score: partAScore,
        total: 5,
        percent: Math.round((partAScore/5)*100)
      })
    }).catch(()=>{});
  }
}

// ── APPLY LANG ON LOAD ──
function applyLang(l) {
  document.querySelectorAll('[data-en]').forEach(el => {
    const v = el.getAttribute('data-' + l) || el.getAttribute('data-en');
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
      el.placeholder = v;
    } else if (el.tagName === 'BUTTON') {
      return; // buttons use child spans
    } else if (el.children.length === 0) {
      el.textContent = v;
    }
  });
}

// ── INIT ──
applyLang('en');
updateDots();
showSlide(1);
</script>
</body>
</html>
